name: Build vmConsole APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - .github/workflows/build-apk.yml
      - app/**
      - external/alpine_iso/**
      - external/libvmc/**
      - gradle/**
      - gradle.properties
      - settings.gradle
      - build.gradle
      - gradlew
      - gradlew.bat
  pull_request:
    paths:
      - .github/workflows/build-apk.yml
      - app/**
      - external/alpine_iso/**
      - external/libvmc/**
      - gradle/**
      - gradle.properties
      - settings.gradle
      - build.gradle
      - gradlew
      - gradlew.bat

jobs:
  build-debug-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      ANDROID_SDK_ROOT: /usr/local/lib/android/sdk
      ANDROID_HOME: /usr/local/lib/android/sdk

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Verify project tree
        shell: bash
        run: |
          set -euo pipefail
          test -f ./gradlew
          test -d ./app
          test -d ./external/alpine_iso
          test -d ./external/libvmc

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '11'

      - name: Set up Android SDK packages
        shell: bash
        run: |
          set -euo pipefail
          echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties
          SDKMANAGER="$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager"
          if [ ! -x "$SDKMANAGER" ]; then
            SDKMANAGER="$ANDROID_SDK_ROOT/cmdline-tools/16.0/bin/sdkmanager"
          fi
          yes | "$SDKMANAGER" --licenses || true
          "$SDKMANAGER" --install \
            "platform-tools" \
            "platforms;android-32" \
            "build-tools;32.0.0"

      - name: Prepare Alpine abuild key
        working-directory: external/alpine_iso
        env:
          RSA_KEY_PASSPHRASE: ${{ secrets.ABUILD_KEY_PASSPHRASE }}
        run: |
          set -euo pipefail
          if [ -z "${RSA_KEY_PASSPHRASE:-}" ]; then
            cd ./abuild-keys
            rm -f vmconsole-dev.*
            openssl genrsa -out vmconsole-dev.rsa 2048
            openssl rsa -in vmconsole-dev.rsa -pubout -out vmconsole-dev.rsa.pub
            openssl aes-256-cbc -in vmconsole-dev.rsa -out vmconsole-dev.rsa.enc -k "pass" -pbkdf2
            rm -f vmconsole-dev.rsa
          fi

      - name: Pin Alpine ISO builder to stable repositories
        working-directory: external/alpine_iso
        run: |
          set -euo pipefail
          sed -i 's|^ALPINE_LINUX_TAG := .*|ALPINE_LINUX_TAG := v3.23|' Makefile
          sed -i 's|^ALPINE_LINUX_REPO_EDGE := .*|ALPINE_LINUX_REPO_EDGE := https://dl-cdn.alpinelinux.org/alpine/v3.23/main|' Makefile
          sed -i 's|^ALPINE_LINUX_REPO_EDGE_COMMUNITY := .*|ALPINE_LINUX_REPO_EDGE_COMMUNITY := https://dl-cdn.alpinelinux.org/alpine/v3.23/community|' Makefile
          sed -i '/ALPINE_LINUX_REPO_TESTING/d' Makefile
          sed -i '/ALPINE_LINUX_REPO_TESTING/d' mkimage.sh || true

      - name: Use minimal runtime package set for Alpine ISO
        working-directory: external/alpine_iso
        run: |
          set -euo pipefail
          cat > packages.txt <<'EOF'
          alpine-base
          bash
          curl
          e2fsprogs
          e2fsprogs-extra
          libc6-compat
          lynx
          nano
          nano-syntax
          openssh-client
          openssl
          syslinux
          tmux
          vim
          EOF

      - name: Build Alpine Linux ISO
        working-directory: external/alpine_iso
        env:
          RSA_KEY_PASSPHRASE: ${{ secrets.ABUILD_KEY_PASSPHRASE }}
        run: |
          set -euo pipefail
          if [ -z "${RSA_KEY_PASSPHRASE:-}" ]; then
            export RSA_KEY_PASSPHRASE=pass
          fi
          make build-docker OUTPUT_DIR=$(realpath ../../app/src/main/assets)

      - name: Patch zlib package version for libVMC
        working-directory: external/libvmc/packages/zlib
        run: |
          set -euo pipefail
          sed -i 's/^PACKAGE_VERSION=.*/PACKAGE_VERSION="1.3.2"/' build.sh
          sed -i 's/^PACKAGE_SHA256=.*/PACKAGE_SHA256="d7a0654783a4da529d1bb793b7ad9c3318020af77667bcae35f95d0e42a792f3"/' build.sh

      - name: Build libVMC Docker image
        working-directory: external/libvmc/scripts
        run: docker build -t libvmc-buildenv .

      - name: Build libVMC for arm64-v8a
        working-directory: external/libvmc
        run: |
          set -euo pipefail
          find ./jniLibs -type f -delete || true
          ./scripts/run-docker.sh ./build-package.sh -a aarch64 qemu-system

      - name: Prepare Gradle wrapper
        run: chmod +x ./gradlew

      - name: Build debug APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Upload debug APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: vmconsole-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
